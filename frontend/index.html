<!DOCTYPE html>
<html lang="en">
<head>
    <title>Product Management</title>
    <style>
        /* Restoring the missing CSS */
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h3, h4 { color: #2d3748; }
        input { padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #4299e1; color: white; border: none; border-radius: 4px; }
        button:hover { background: #3182ce; }
        #product-list div { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Product Management</h3>
        <div id="product-list"></div>
        <hr>
        <h4>Add/Modify Product</h4>
        <input type="hidden" id="prod-id">
        <input type="text" id="prod-name" placeholder="Product Name">
        <input type="number" id="prod-price" placeholder="Price">
        <button onclick="saveProduct()">Save Product</button>
    </div>

    <script>
        async function placeOrder(productId) {
    const response = await fetch('/api/orders/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ product_id: productId })
    });
    const result = await response.json();
    alert(result.message || result.error);
}
        // Added trailing slashes to routes to prevent 404s
        async function loadProducts() {
            try {
                const res = await fetch('/api/products/'); 
                const products = await res.json();
                const list = document.getElementById('product-list');
                list.innerHTML = products.map(p => `
                    <div>
                        <span><strong>${p.name}</strong> - $${p.price}</span>
                        <div>
                            <button onclick="fillForm('${p.id}', '${p.name}', ${p.price})">Edit</button>
                            <button onclick="placeOrder('${p.id}')" style="background: #48bb78">Buy</button>
                            <button style="background:#f56565" onclick="deleteProduct('${p.id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Failed to load products:", err);
            }
        }

        async function saveProduct() {
            const id = document.getElementById('prod-id').value;
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/products/${id}/` : '/api/products/';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price })
            });
            
            // Clear form
            document.getElementById('prod-id').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-price').value = '';
            loadProducts();
        }

        function fillForm(id, name, price) {
            document.getElementById('prod-id').value = id;
            document.getElementById('prod-name').value = name;
            document.getElementById('prod-price').value = price;
        }

        async function deleteProduct(id) {
            await fetch(`/api/products/${id}/`, { method: 'DELETE' });
            loadProducts();
        }
        
        loadProducts();
    </script>
</body>
</html>
