server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Route order requests to the order-service container
    location /api/orders {
        proxy_pass http://order-service:5000;
    }

    # Route product requests to the product-service container
    location /api/products {
        proxy_pass http://product-service:3000;
    }
}


