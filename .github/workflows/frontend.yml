name: Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SCA Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          security-checks: 'vuln,config'
          format: 'table'

      # 2. SAST (Code Logic & Secrets Audit)
      - name: SAST Scan
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit p/secrets

      - name: Login to Docker Hub
        if: always()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/micro-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/micro-${{ matrix.service }}:${{ github.sha }}

      - name: Inspect Public Image for Vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/micro-${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '1' # This fails the build if CRITICAL bugs are found in the OS
          severity: 'CRITICAL'

      - name: Update Manifest Repository
        env:
          MANIFEST_REPO: "dev126712/microservice-charts-deployment"
          PAT_TOKEN: ${{ secrets.MANIFEST_REPO_PAT }}
        run: |
          # 1. Clone the manifest repo
          git config --global url."https://x-access-token:${{ env.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git clone https://x-access-token:${{ env.PAT_TOKEN }}@github.com/${{ env.MANIFEST_REPO }}.git manifest-repo
          ls -la
          cd manifest-repo
          
          # 2. Update the tag in the correct directory
          # Using yq to target the backend object within the dev values file
          yq -i '.image.tag = "${{ github.sha }}"' ./frontend/values.yaml
          
          # 3. Commit and Push
          git config user.email ${{ secrets.GIT_EMAIL }}
          git config user.name ${{ secrets.GIT_USERNAME }}
          git add .
          git commit -m "chore(dev): update backend image to ${{ github.sha }} [skip ci]"
          git push origin main
