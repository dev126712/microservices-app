name: Product

on:
  push:
    branches: [ main ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Mapping your local folders to your Docker Hub repo names
        service: [product-service]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SCA Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          security-checks: 'vuln,config'
          format: 'table'

      - name: SAST Scan
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit p/secrets

      - name: Login to Docker Hub
        if: always()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/micro-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/micro-${{ matrix.service }}:${{ github.sha }}

      - name: Inspect Public Image for Vulnerabilities
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/micro-${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '1' # This fails the build if CRITICAL bugs are found in the OS
          severity: 'CRITICAL'
