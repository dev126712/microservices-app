services:
  # --- Databases & Cache ---
  cache:
    image: redis:7-alpine
    networks:
      - micro-network

  db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: orders_db
    networks:
      - micro-network

  # --- Microservices ---
  product-service:
    build: ./product-service
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=cache
    depends_on:
      - cache
    networks:
      - micro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  order-service:
    build: ./order-service
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/orders_db
      - PRODUCT_SERVICE_URL=http://product-service:3000
      - NOTIFICATION_SERVICE_URL=http://notification-service:5001
    depends_on:
      db:
        condition: service_healthy
    networks:
      - micro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  notification-service:
    build: ./notification-service
    ports:
      - "5001:5001"
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s
    networks:
      - micro-network

  frontend:
    build: ./frontend
    container_name: frontend-service
    ports:
      - "8080:80" # Access the UI at http://localhost:8080
    depends_on:
      order-service:
       condition: service_healthy
      product-service:
       condition: service_healthy
      # notification-service:
      #  condition: service_healthy
    networks:
      - micro-network
    restart: always

networks:
  micro-network:
    driver: bridge


